name: Generate and Sync News Card

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab
  # schedule:
  #   - cron: '0 */6 * * *' # Optional: Runs every 6 hours

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests python-dotenv aiogram

      - name: Run Card Generator and Sync
        env:
          # These must be set in your Repo Settings > Secrets > Actions
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python main.py

      - name: Save Result as Artifact
        if: always() # Still saves the image for you to review in GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ig-ready-post
          path: output/
          retention-days: 3
