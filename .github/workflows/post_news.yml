name: Telegram to Instagram Sync

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiogram instagrapi requests python-dotenv

      - name: Run Sync Script
        env:
          # This mapping is why your code was seeing 'empty' variables
          TOKEN: ${{ secrets.TOKEN }}
          IG_SESSION: ${{ secrets.IG_SESSION }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py
