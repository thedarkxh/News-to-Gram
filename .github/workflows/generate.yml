name: Compile Instagram News Posts

on:
  workflow_dispatch: # Allows you to run it manually
  schedule:
    - cron: '0 */6 * * *' # Automatically runs every 6 hours

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core fonts-liberation

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiogram Pillow requests

      - name: Run Multi-Post Compiler
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: python main.py

      - name: Upload Compiled Posts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-news-posts
          path: compiled_posts/
          retention-days: 5
